seed: 42
output_dir: outputs
device: cuda

models:
  gen_model_7b: Qwen/Qwen2.5-Coder-7B-Instruct
  gen_model_14b: Qwen/Qwen2.5-Coder-14B-Instruct
  cross_model: deepseek-ai/DeepSeek-Coder-V2-Lite-Instruct
  judge_model_primary: OpenGVLab/InternVL3-8B
  judge_model_secondary: Qwen/Qwen2.5-VL-7B-Instruct
  inter_judge_sample_size: 300
  embed_model: sentence-transformers/all-MiniLM-L6-v2
  router_backbone: bert-base-uncased

data:
  vgbench_dir: data/vgbench
  visplotbench_dir: data/visplotbench
  output_dir: data/processed
  formats:
    - svg
    - tikz
  min_cell_count: 50
  similarity_threshold: 0.70

generation:
  max_new_tokens: 2048
  temperature: 0.0
  top_p: 1.0
  batch_size: 8
  num_samples: 1
  vllm_tensor_parallel: 1
  gpu_memory_utilization: 0.90

render:
  svg_timeout: 10
  tikz_timeout: 30
  graphviz_timeout: 10
  tikz_max_workers: 4
  output_dpi: 300

evaluation:
  fid_batch_size: 32
  judge_batch_size: 4
  inter_judge_sample_size: 200
  kappa_threshold: 0.6

features:
  extractor_a_model: Qwen/Qwen2.5-7B-Instruct
  extractor_b_model: Qwen/Qwen2.5-Coder-7B-Instruct
  agreement_pearson_threshold: 0.75
  agreement_kappa_threshold: 0.6
  n_bootstrap: 1000

routing:
  bert_lr: 2.0e-5
  bert_epochs: 5
  bert_batch_size: 32
  proto_k: 5

decoupling:
  pseudocode_max_tokens: 1024
  conversion_max_tokens: 2048
